name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Static analysis & unit tests
  # ---------------------------------------------------------------------------
  verify:
    name: Lint · Typecheck · Unit tests · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Next.js build
        run: npm run build
        env:
          # Silence the cosmetic metadataBase warning – Vercel sets this
          # automatically in the real deployment.
          VERCEL: "1"
          VERCEL_URL: "satis.aero"

      - name: Upload Next.js build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Lighthouse CI – performance, accessibility, SEO and best-practice budgets
  # ---------------------------------------------------------------------------
  lighthouse:
    name: Lighthouse CI
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Restore Next.js build
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          # Boot `next start` on the runner and point Lighthouse at the
          # canonical set of public routes. The budgets and assertions
          # live in `.github/lighthouserc.json`.
          urls: |
            http://localhost:3000/
            http://localhost:3000/en/
            http://localhost:3000/leistungen/cat9-mockup-training/
            http://localhost:3000/en/services/cat9-mockup-training/
            http://localhost:3000/kontakt/
            http://localhost:3000/en/contact/
            http://localhost:3000/impressum/
            http://localhost:3000/datenschutz/
          configPath: ./.github/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1
        env:
          VERCEL: "1"
          VERCEL_URL: "satis.aero"
